<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work — Selected Work</title>
<link rel="stylesheet" href="work.css" />
<link rel="stylesheet" href="b-common.css" />
<link rel="stylesheet" href="work-prod.css" />
<style>
  html, body { margin: 0; background: var(--base); }
</style>
</head>
<body>
<div id="root"></div>

<script src="image-slot.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="work-shared.jsx"></script>
<script type="text/babel" src="b-shared.jsx"></script>
<script type="text/babel" src="work-prod.jsx"></script>

<script type="text/babel">
  const { useEffect } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#818cf8",
    "secondary": "#2dd4bf",
    "visual": true,
    "highlights": true,
    "stars": true
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    useEffect(() => {
      const r = document.documentElement;
      r.style.setProperty('--accent', t.accent);
      r.style.setProperty('--glow', t.accent);
      r.style.setProperty('--secondary', t.secondary);
      r.classList.toggle('b-novisual', !t.visual);
      r.classList.toggle('b-nohi', !t.highlights);
      r.classList.toggle('wk-nostars', !t.stars);
    }, [t.accent, t.secondary, t.visual, t.highlights, t.stars]);

    return (
      <React.Fragment>
        <WorkSection />
        <TweaksPanel>
          <TweakSection label="Theme" />
          <TweakColor label="Primary accent" value={t.accent}
            options={['#818cf8', '#a78bfa', '#60a5fa', '#22d3ee']}
            onChange={(v) => setTweak('accent', v)} />
          <TweakColor label="Secondary accent" value={t.secondary}
            options={['#2dd4bf', '#34d399', '#fcd34d', '#f472b6']}
            onChange={(v) => setTweak('secondary', v)} />
          <TweakSection label="Featured panel" />
          <TweakToggle label="Screenshot area" value={t.visual}
            onChange={(v) => setTweak('visual', v)} />
          <TweakToggle label="Highlights" value={t.highlights}
            onChange={(v) => setTweak('highlights', v)} />
          <TweakSection label="Backdrop" />
          <TweakToggle label="Starfield" value={t.stars}
            onChange={(v) => setTweak('stars', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
