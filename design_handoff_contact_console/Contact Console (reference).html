<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Unified Console (reference)</title>
<link rel="stylesheet" href="hero.css" />
<link rel="stylesheet" href="ctbase.css" />
<link rel="stylesheet" href="ctcombo.css" />
<link rel="stylesheet" href="ct8.css" />
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  /* letterbox the fixed 1440×860 design and scale it to fit any viewport */
  #stage { position: fixed; inset: 0; display: grid; place-items: center; background: #000; }
  #frame { width: 1440px; height: 860px; transform-origin: center center; }
</style>
</head>
<body>
<div id="stage"><div id="frame"><div id="root"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hero-shared.jsx"></script>
<script type="text/babel" src="ct-shared.jsx"></script>
<script type="text/babel" src="ctcombo.jsx"></script>
<script type="text/babel" src="ct8.jsx"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<CT8 />);
  // scale the 1440×860 frame to fit the viewport (letterbox)
  function fit() {
    const f = document.getElementById('frame');
    const s = Math.min(window.innerWidth / 1440, window.innerHeight / 860);
    f.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>
</body>
</html>
